name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm eslint
      - run: pnpm test -- --exclude '**/agents/evals/**'

