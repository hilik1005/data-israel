name: Eval Tests

on:
  workflow_dispatch:

jobs:
  eval-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run eval:all
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
